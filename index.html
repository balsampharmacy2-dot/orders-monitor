<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Orders Monitor</title>
</head>
<body>

<h1>Waiting for orders...</h1>

<p>Click anywhere once to activate sound 🔊</p>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// 🔥 Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBFI9O0DcZcZJJgwFp6cCgd8PJU2PRC9z8",
  databaseURL: "https://orders-app-34ff4-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let audioContext;
let soundEnabled = false;

// 🔊 init مرة واحدة
function initAudio() {
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }

  if (audioContext.state === "suspended") {
    audioContext.resume();
  }

  soundEnabled = true;
  console.log("Sound Enabled");
}

// 🔥 صوت أقوى وأطول
function playBeep() {
  if (!audioContext) return;

  const oscillator = audioContext.createOscillator();
  const gain = audioContext.createGain();

  oscillator.type = "square"; // أقوى من sine
  oscillator.frequency.value = 1200;

  gain.gain.value = 0.5;

  oscillator.connect(gain);
  gain.connect(audioContext.destination);

  oscillator.start();

  setTimeout(() => {
    oscillator.stop();
  }, 600); // أطول صوت
}

// 🔥 Auto enable عند أول تفاعل
function autoEnable() {
  initAudio();
  document.removeEventListener("click", autoEnable);
  document.removeEventListener("scroll", autoEnable);
  document.removeEventListener("keydown", autoEnable);
}

// أي interaction يشغل الصوت
document.addEventListener("click", autoEnable);
document.addEventListener("scroll", autoEnable);
document.addEventListener("keydown", autoEnable);

// 🔔 Firebase listener
db.ref("orders").on("child_added", function(snapshot) {

  console.log("New Order 🔥", snapshot.val());

  if (soundEnabled) {
    playBeep();
  }

});

</script>

</body>
</html>
