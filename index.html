<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Orders Monitor</title>
</head>
<body>

<h1>Waiting for orders...</h1>

<button onclick="enableSound()">Enable Sound 🔊</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// 🔥 Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBFI9O0DcZcZJJgwFp6cCgd8PJU2PRC9z8",
  databaseURL: "https://orders-app-34ff4-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let soundEnabled = false;
let audioContext;

// 🔊 إنشاء صوت ثابت (مرة واحدة فقط)
function initAudio() {
  audioContext = new (window.AudioContext || window.webkitAudioContext)();
}

// 🔊 beep قوي ومضمون
function playBeep() {
  if (!audioContext) return;

  const oscillator = audioContext.createOscillator();
  const gain = audioContext.createGain();

  oscillator.connect(gain);
  gain.connect(audioContext.destination);

  oscillator.type = "sine";
  oscillator.frequency.value = 1000;
  gain.gain.value = 0.2;

  oscillator.start();

  setTimeout(() => {
    oscillator.stop();
  }, 200);
}

// 🔊 تفعيل الصوت
function enableSound() {
  initAudio();
  playBeep();
  soundEnabled = true;
  console.log("Sound Enabled");
}

// 🔔 Firebase listener
db.ref("orders").on("child_added", function(snapshot) {

  console.log("New Order 🔥", snapshot.val());

  if (soundEnabled && audioContext) {
    playBeep();
  }

});

</script>

</body>
</html>
