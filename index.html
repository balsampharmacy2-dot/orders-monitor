<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Orders Monitor</title>
</head>
<body>

<h1>Waiting for orders...</h1>

<button onclick="enableSound()">Enable Sound 🔊</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBFI9O0DcZcZJJgwFp6cCgd8PJU2PRC9z8",
  databaseURL: "https://orders-app-34ff4-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let soundEnabled = false;

// 🔊 صوت داخلي (بدون أي ملفات)
function playBeep() {
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  const context = new AudioContext();

  const oscillator = context.createOscillator();
  const gainNode = context.createGain();

  oscillator.type = "sine";
  oscillator.frequency.value = 900; // نغمة
  gainNode.gain.value = 0.2;

  oscillator.connect(gainNode);
  gainNode.connect(context.destination);

  oscillator.start();

  setTimeout(() => {
    oscillator.stop();
    context.close();
  }, 200);
}

// 🔊 تفعيل الصوت (لازم ضغط المستخدم)
function enableSound() {
  playBeep();
  soundEnabled = true;
  alert("Sound Enabled 🔊");
}

// 🔔 استقبال الأوردرات من Firebase
db.ref("orders").on("child_added", function(snapshot) {

  console.log("New Order 🔥", snapshot.val());

  if (soundEnabled) {
    playBeep();
  }

});

</script>

</body>
</html>
