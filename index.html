<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Orders Control Center</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{
    background: radial-gradient(circle at top,#111827,#020617);
    color:white;
    font-family:Arial;
    min-height:100vh;
}

/* NAV */
.navbar-custom{
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(255,255,255,.08);
    padding:15px;
}

.live-badge{
    background:#22c55e;
    color:black;
    padding:5px 10px;
    border-radius:999px;
    font-size:12px;
}

/* STATS */
.stats-card{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;
    padding:20px;
}

/* ORDER */
.order-card{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    padding:15px;
    animation:show .3s ease;
}

.order-title{
    font-weight:bold;
}

.done{
    opacity:.5;
    text-decoration:line-through;
}

/* ANIMATION */
@keyframes show{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}

.flash{
    animation:flash .4s;
}

@keyframes flash{
    0%{background:#14532d;}
    100%{background:transparent;}
}

.toast-custom{
    position:fixed;
    top:20px;
    right:20px;
    background:linear-gradient(135deg,#22c55e,#16a34a);
    color:black;
    padding:12px 16px;
    border-radius:14px;
    font-weight:bold;
    z-index:9999;
}

</style>

</head>

<body>

<!-- HEADER -->
<nav class="navbar navbar-custom d-flex justify-content-between">

<div class="d-flex gap-3 align-items-center">

    <h5 class="m-0">
        ⚡ Orders Control
    </h5>

    <div class="live-badge">LIVE</div>

</div>

<button class="btn btn-success btn-sm" id="alertToggle">
🔊 Enable Sound
</button>

</nav>

<!-- STATS -->
<div class="container mt-3">

<div class="stats-card mb-3">
    <div>Total Orders</div>
    <h2 id="counter">0</h2>
</div>

<!-- ORDERS -->
<div id="orders" class="d-grid gap-3"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>

/* FIREBASE */
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    databaseURL: "YOUR_DB_URL"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= AUDIO ================= */

let audioEnabled = false;
let audioContext = null;

async function initAudio(){

    if(!audioContext){
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }

    if(audioContext.state === "suspended"){
        await audioContext.resume();
    }

}

function playBeep(){

    if(!audioEnabled) return;
    if(!audioContext) return;

    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();

    osc.type = "square";
    osc.frequency.value = 1000;

    gain.gain.value = 0.6;

    osc.connect(gain);
    gain.connect(audioContext.destination);

    osc.start();

    setTimeout(()=>osc.stop(),300);

}

/* ================= BUTTON ================= */

$("#alertToggle").click(async function(){

    if(!audioEnabled){

        await initAudio();

        audioEnabled = true;

        $(this)
        .removeClass("btn-success")
        .addClass("btn-danger")
        .html("🔇 Disable Sound");

        playBeep();

    }else{

        audioEnabled = false;

        $(this)
        .removeClass("btn-danger")
        .addClass("btn-success")
        .html("🔊 Enable Sound");

    }

});

/* ================= UI ================= */

let orderNumber = 0;
let total = 0;

/* COUNTER */
function updateCounter(){
    total++;
    $("#counter").text(total);
}

/* TOAST */
function toast(){
    const t = $('<div class="toast-custom">🔔 New Order</div>');
    $("body").append(t);
    setTimeout(()=>t.remove(),2000);
}

/* FLASH */
function flash(){
    $("body").addClass("flash");
    setTimeout(()=>$("body").removeClass("flash"),400);
}

/* ORDER */
function addOrder(data){

    orderNumber++;

    const time = new Date().getTime();

    const card = $(`
        <div class="order-card" data-time="${time}">

            <div class="d-flex justify-content-between mb-2">

                <span class="badge bg-primary">
                    #${orderNumber}
                </span>

                <small>${new Date().toLocaleTimeString()}</small>

            </div>

            <div class="order-title">
                ${data.title || "Notification"}
            </div>

            <div class="mb-2">
                ${data.text || ""}
            </div>

            <button class="btn btn-sm btn-success doneBtn">
                <i class="fa fa-check"></i> Mark as Done
            </button>

        </div>
    `);

    $("#orders").prepend(card);
}

/* DONE */
$(document).on("click",".doneBtn",function(){

    const card = $(this).closest(".order-card");

    card.addClass("done");

    $(this)
    .removeClass("btn-success")
    .addClass("btn-secondary")
    .text("Done");

});

/* AUTO DELETE 30 MIN */
setInterval(()=>{

    const now = new Date().getTime();

    $(".order-card").each(function(){

        const t = $(this).data("time");

        if(now - t > 1800000){

            $(this).fadeOut(300,function(){
                $(this).remove();
            });

        }

    });

},60000);

/* FIREBASE */
db.ref("orders").on("child_added",function(snapshot){

    const data = snapshot.val();

    updateCounter();
    addOrder(data);

    toast();
    flash();
    playBeep();

});

</script>

</body>
</html>
