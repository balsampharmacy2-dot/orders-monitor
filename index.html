<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Orders App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* Header */
.header {
  background: #111827;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

/* Counter */
.counter {
  text-align: center;
  margin: 10px;
  color: #38bdf8;
}

/* Container */
.container {
  padding: 10px;
}

/* Order Card */
.card {
  background: #1f2937;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 12px;
  border-left: 5px solid #22c55e;
  animation: pop 0.3s ease;
}

@keyframes pop {
  from { transform: scale(0.95); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* Popup */
.popup {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #22c55e;
  padding: 12px 20px;
  border-radius: 10px;
  color: black;
  font-weight: bold;
  animation: slide 0.3s ease;
}

@keyframes slide {
  from { transform: translateX(100px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

button {
  background: #3b82f6;
  border: none;
  padding: 10px;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="header">🔥 Orders Dashboard</div>

<div class="counter" id="counter">Orders: 0</div>

<div class="container" id="orders"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBFI9O0DcZcZJJgwFp6cCgd8PJU2PRC9z8",
  databaseURL: "https://orders-app-34ff4-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Audio
let audioContext;
let count = 0;

function initAudio() {
  audioContext = new (window.AudioContext || window.webkitAudioContext)();
}

function beep() {
  if (!audioContext) return;

  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();

  osc.frequency.value = 1000;
  gain.gain.value = 0.3;

  osc.connect(gain);
  gain.connect(audioContext.destination);

  osc.start();
  setTimeout(() => osc.stop(), 300);
}

// Popup
function popup() {
  const div = document.createElement("div");
  div.className = "popup";
  div.innerText = "🔔 New Order";
  document.body.appendChild(div);

  setTimeout(() => div.remove(), 2000);
}

// Add card
function addOrder(data) {
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = "📦 New Order Received";
  document.getElementById("orders").prepend(div);
}

// Listen
db.ref("orders").on("child_added", function(snapshot) {

  count++;
  document.getElementById("counter").innerText = "Orders: " + count;

  addOrder(snapshot.val());
  popup();

  if (audioContext) beep();

});

document.addEventListener("click", () => {
  if (!audioContext) initAudio();
});

</script>

</body>
</html>
