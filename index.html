<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Orders Control Center</title>

<style>

/* ===== BODY ===== */

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:
    radial-gradient(circle at top,#0f172a,#020617);
    color:white;
    overflow-x:hidden;
}

/* ===== HEADER ===== */

.header{
    position:sticky;
    top:0;
    z-index:100;
    backdrop-filter:blur(14px);
    background:rgba(255,255,255,0.05);
    border-bottom:1px solid rgba(255,255,255,0.08);

    padding:18px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:20px;
    font-weight:bold;
}

.status{
    font-size:13px;
    color:#22c55e;
}

/* ===== COUNTER ===== */

.stats{
    padding:15px;
}

.counter-card{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
    padding:18px;

    backdrop-filter:blur(10px);

    box-shadow:
    0 8px 30px rgba(0,0,0,0.25);
}

.counter-title{
    color:#94a3b8;
    font-size:14px;
}

.counter-value{
    font-size:34px;
    font-weight:bold;
    margin-top:8px;
}

/* ===== ORDERS ===== */

.orders{
    padding:15px;
    display:grid;
    gap:14px;
}

/* ===== CARD ===== */

.card{
    position:relative;

    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.08);

    border-radius:18px;

    padding:18px;

    overflow:hidden;

    backdrop-filter:blur(12px);

    animation:show .3s ease;

    box-shadow:
    0 10px 35px rgba(0,0,0,0.3);
}

.card::before{
    content:"";

    position:absolute;

    width:200%;
    height:200%;

    background:
    linear-gradient(
        45deg,
        transparent,
        rgba(56,189,248,.08),
        transparent
    );

    top:-50%;
    left:-50%;

    transform:rotate(25deg);
}

.order-top{
    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:12px;
}

.badge{
    background:#22c55e;
    color:black;

    font-size:12px;
    font-weight:bold;

    padding:6px 10px;

    border-radius:999px;
}

.time{
    color:#94a3b8;
    font-size:12px;
}

.order-title{
    font-size:18px;
    font-weight:bold;
    margin-bottom:10px;
}

.order-json{
    color:#cbd5e1;
    font-size:13px;
    line-height:1.6;
    word-break:break-word;
}

/* ===== POPUP ===== */

.popup{
    position:fixed;
    top:20px;
    right:20px;

    background:
    linear-gradient(
        135deg,
        #22c55e,
        #16a34a
    );

    color:black;

    padding:14px 18px;

    border-radius:14px;

    font-weight:bold;

    box-shadow:
    0 10px 30px rgba(0,0,0,.4);

    animation:slide .35s ease;

    z-index:9999;
}

/* ===== FLASH ===== */

.flash{
    animation:flashAnim .5s;
}

@keyframes flashAnim{
    0%{
        background:#14532d;
    }

    100%{
        background:transparent;
    }
}

/* ===== ANIMATIONS ===== */

@keyframes show{
    from{
        opacity:0;
        transform:translateY(20px) scale(.95);
    }

    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

@keyframes slide{
    from{
        opacity:0;
        transform:translateX(120px);
    }

    to{
        opacity:1;
        transform:translateX(0);
    }
}

/* ===== MOBILE ===== */

@media(max-width:600px){

    .counter-value{
        font-size:28px;
    }

    .order-title{
        font-size:16px;
    }

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

    <div class="logo">
        🔥 Orders Control
    </div>

    <div class="status">
        ● LIVE
    </div>

</div>

<!-- STATS -->

<div class="stats">

    <div class="counter-card">

        <div class="counter-title">
            Total Orders
        </div>

        <div class="counter-value" id="counter">
            0
        </div>

    </div>

</div>

<!-- ORDERS -->

<div class="orders" id="orders"></div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

/* =========================
   FIREBASE
========================= */

const firebaseConfig = {

    apiKey:
    "AIzaSyBFI9O0DcZcZJJgwFp6cCgd8PJU2PRC9z8",

    databaseURL:
    "https://orders-app-34ff4-default-rtdb.firebaseio.com"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* =========================
   AUDIO
========================= */

let audioContext = null;

/* enable audio */

async function initAudio(){

    if(!audioContext){

        audioContext =
        new (
            window.AudioContext ||
            window.webkitAudioContext
        )();

    }

    if(audioContext.state === "suspended"){
        await audioContext.resume();
    }

    beep();

}

/* beep */

async function beep(){

    if(!audioContext) return;

    if(audioContext.state === "suspended"){
        await audioContext.resume();
    }

    const osc1 =
    audioContext.createOscillator();

    const osc2 =
    audioContext.createOscillator();

    const gain =
    audioContext.createGain();

    osc1.type = "square";
    osc2.type = "square";

    osc1.frequency.value = 900;
    osc2.frequency.value = 1300;

    gain.gain.value = 0.8;

    osc1.connect(gain);
    osc2.connect(gain);

    gain.connect(audioContext.destination);

    osc1.start();
    osc2.start();

    setTimeout(() => {

        osc1.stop();
        osc2.stop();

    }, 350);

}

/* first click unlock */

document.addEventListener("click", () => {

    initAudio();

}, { once:true });

/* =========================
   UI
========================= */

let total = 0;

/* popup */

function showPopup(){

    const div =
    document.createElement("div");

    div.className = "popup";

    div.innerHTML =
    "🔔 New Order Received";

    document.body.appendChild(div);

    setTimeout(() => {

        div.remove();

    }, 2500);

}

/* flash */

function flashScreen(){

    document.body.classList.add("flash");

    setTimeout(() => {

        document.body.classList.remove("flash");

    }, 500);

}

/* add order */

function addOrder(data){

    const div =
    document.createElement("div");

    div.className = "card";

    const now =
    new Date().toLocaleTimeString();

    div.innerHTML = `

        <div class="order-top">

            <div class="badge">
                NEW ORDER
            </div>

            <div class="time">
                ${now}
            </div>

        </div>

        <div class="order-title">
    🔔 ${data.title || "New Notification"}
        </div>
        
        <div class="order-json">
            ${data.text || ""}
        </div>
        
        <div style="
        margin-top:10px;
        font-size:12px;
        color:#94a3b8;
        ">
            📱 ${data.app || ""}
        </div>
    `;

    document
    .getElementById("orders")
    .prepend(div);

}

/* counter */

function updateCounter(){

    total++;

    document
    .getElementById("counter")
    .innerText = total;

}

/* =========================
   FIREBASE LISTENER
========================= */

db.ref("orders")
.on("child_added", function(snapshot){

    const data = snapshot.val();

    console.log(
        "New Order 🔥",
        data
    );

    updateCounter();

    addOrder(data);

    showPopup();

    flashScreen();

    beep();

});

</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
