<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Orders Control</title>

<style>
/* ====== BACKGROUND ====== */
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  overflow-x: hidden;
}

/* ====== TOP BAR ====== */
.header {
  position: sticky;
  top: 0;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.05);
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* ====== COUNTER ====== */
.counter {
  text-align: center;
  margin: 10px;
  color: #38bdf8;
  font-size: 18px;
}

/* ====== GRID ====== */
.container {
  padding: 15px;
  display: grid;
  gap: 12px;
}

/* ====== CARD (GLASS STYLE) ====== */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 15px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  animation: pop 0.3s ease;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, transparent, rgba(56,189,248,0.1), transparent);
  transform: rotate(25deg);
}

/* ====== ANIMATION ====== */
@keyframes pop {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* ====== POPUP ====== */
.popup {
  position: fixed;
  top: 20px;
  right: 20px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  padding: 12px 18px;
  border-radius: 12px;
  font-weight: bold;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  animation: slide 0.3s ease;
}

@keyframes slide {
  from { transform: translateX(100px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* ====== GLOW EFFECT ====== */
.glow {
  position: absolute;
  width: 200px;
  height: 200px;
  background: #38bdf8;
  filter: blur(120px);
  opacity: 0.2;
  border-radius: 50%;
  top: -50px;
  left: -50px;
}
</style>

</head>

<body>

<div class="header">🔥 Orders Control Center</div>

<div class="counter" id="counter">Orders: 0</div>

<div class="container" id="orders"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBFI9O0DcZcZJJgwFp6cCgd8PJU2PRC9z8",
  databaseURL: "https://orders-app-34ff4-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let audio;

// init sound
function initAudio() {
  audio = new (window.AudioContext || window.webkitAudioContext)();
}

// ultra sound
function beep() {
  if (!audio) return;

  const osc = audio.createOscillator();
  const gain = audio.createGain();

  osc.type = "square";
  osc.frequency.value = 1200;
  gain.gain.value = 0.4;

  osc.connect(gain);
  gain.connect(audio.destination);

  osc.start();
  setTimeout(() => osc.stop(), 200);
}

// popup
function popup() {
  const div = document.createElement("div");
  div.className = "popup";
  div.innerText = "🔔 New Order!";
  document.body.appendChild(div);

  setTimeout(() => div.remove(), 2000);
}

// add card
function addOrder(data) {
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    📦 <b>New Order</b><br>
    <small>${JSON.stringify(data)}</small>
  `;
  document.getElementById("orders").prepend(div);
}

// counter
let count = 0;

// listener
db.ref("orders").on("child_added", function(snapshot) {

  count++;
  document.getElementById("counter").innerText = "Orders: " + count;

  addOrder(snapshot.val());
  popup();

  if (audio) beep();

});

// enable sound
document.addEventListener("click", () => {
  if (!audio) initAudio();
});

</script>

</body>
</html>
